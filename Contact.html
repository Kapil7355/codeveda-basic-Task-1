<body> 
    <div class="container contact-Details">
        <h1>Contact Us</h1>
        <p>If you have any questions or need assistance, feel free to reach out to us!</p><br>

        <main class="contact-form">
            <h2 style="text-align: center; font-size: 35px; margin-top: 10px ; padding: 10px;">Contact Form</h2>
            <form action="#" method="post">
                <label for="name">Name:</label><br>
                <input type="text" id="name" name="name" required><br><br>

                <label for="email">Email:</label><br> 
                <input type="email" id="email" name="email" required><br><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" required></textarea><br><br>

                <button type="submit">Submit</button>
            </form>

        </main>
    </div>
